<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자유 게시판 — JayKwon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #F7F8FA; --card: #FFFFFF; --text: #111827;
      --sub: #6B7280; --point: #2563EB; --danger: #DC2626;
      --border: #E5E7EB; --radius: 12px; --max-w: 860px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(247,248,250,0.88); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); z-index: 100; height: 56px; }
    .nav-inner { max-width: var(--max-w); margin: 0 auto; padding: 0 2rem; height: 100%; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; color: var(--point); text-decoration: none; }
    .nav-links { display: flex; gap: 1.75rem; align-items: center; }
    .nav-links a { font-size: 14px; color: var(--sub); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); font-weight: 500; }
    .nav-user { font-size: 13px; color: var(--sub); font-family: 'JetBrains Mono', monospace; }
    .nav-logout { font-size: 13px; color: var(--danger); cursor: pointer; border: none; background: none; font-family: 'Noto Sans KR', sans-serif; }
    main { max-width: var(--max-w); margin: 0 auto; padding: 88px 2rem 4rem; }
    .page-header { margin-bottom: 2rem; animation: fadeUp 0.5s ease both; }
    .page-header h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .page-header p { font-size: 14px; color: var(--sub); }
    .write-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 2rem; animation: fadeUp 0.5s ease 0.1s both; }
    .write-card h2 { font-size: 14px; font-weight: 500; color: var(--sub); margin-bottom: 1rem; font-family: 'JetBrains Mono', monospace; }
    .form-group { margin-bottom: 12px; }
    .form-group input, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.2s; resize: none; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--point); background: #fff; }
    .form-group textarea { height: 80px; }
    .form-footer { display: flex; justify-content: flex-end; }
    .btn-submit { background: var(--point); color: #fff; border: none; padding: 9px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: background 0.2s; }
    .btn-submit:hover { background: #1d4ed8; }
    .todo-list { display: flex; flex-direction: column; gap: 10px; }
    .todo-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; display: flex; align-items: flex-start; gap: 14px; transition: box-shadow 0.2s; animation: fadeUp 0.4s ease both; }
    .todo-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
    .todo-body { flex: 1; min-width: 0; }
    .todo-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; color: var(--text); }
    .todo-content { font-size: 13px; color: var(--sub); line-height: 1.6; white-space: pre-wrap; }
    .todo-meta { font-size: 11px; color: #9CA3AF; margin-top: 8px; font-family: 'JetBrains Mono', monospace; }
    .todo-author { font-size: 11px; color: var(--point); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
    .item-actions { display: flex; gap: 2px; flex-shrink: 0; }
    .edit-btn, .del-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 3px 7px; border-radius: 4px; transition: color 0.15s, background 0.15s; color: #D1D5DB; }
    .edit-btn:hover { color: var(--point); background: rgba(37,99,235,0.07); }
    .del-btn:hover { color: var(--danger); background: rgba(220,38,38,0.07); }
    .edit-form { display: flex; flex-direction: column; gap: 8px; flex: 1; width: 100%; }
    .edit-form input, .edit-form textarea { width: 100%; padding: 7px 10px; border: 1px solid var(--point); border-radius: 6px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; color: var(--text); background: #fff; outline: none; resize: none; }
    .edit-form textarea { height: 64px; }
    .edit-actions { display: flex; gap: 6px; justify-content: flex-end; }
    .btn-save { background: var(--point); color: #fff; border: none; padding: 5px 14px; border-radius: 6px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }
    .btn-cancel { background: none; color: var(--sub); border: 1px solid var(--border); padding: 5px 14px; border-radius: 6px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }
    .empty { text-align: center; padding: 4rem 2rem; color: var(--sub); font-size: 14px; }
    .empty span { display: block; font-size: 32px; margin-bottom: 12px; }
    .loading { text-align: center; padding: 3rem; color: var(--sub); font-size: 14px; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="index.html">JayKwon.dev</a>
    <div class="nav-links" id="navLinks">
      <a href="index.html">홈</a>
      <a href="todos.html" class="active">게시판</a>
      <a href="study.html">공부기록</a>
      <a href="login.html" id="loginLink">로그인</a>
    </div>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>게시판</h1>
    <p>자유롭게 글을 남겨주세요.</p>
  </div>

  <div class="write-card">
    <h2>// new_post</h2>
    <div class="form-group">
      <input type="text" id="titleInput" placeholder="제목을 입력하세요" maxlength="80">
    </div>
    <div class="form-group">
      <textarea id="contentInput" placeholder="내용을 입력하세요"></textarea>
    </div>
    <div class="form-footer">
      <button class="btn-submit" onclick="addPost()">작성하기</button>
    </div>
  </div>

  <div class="todo-list" id="postList"><div class="loading">불러오는 중...</div></div>
</main>

<script>
  const SUPABASE_URL = 'https://eqwxzlkamtifvkrhxwcs.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_tzfzmMEM6w03xg08XN1SpA_9lHshBSq';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let posts = [];
  let editingId = null;
  let currentUser = null;

  async function initAuth() {
    const { data: { user } } = await sb.auth.getUser();
    currentUser = user;
    if (user) {
      document.getElementById('loginLink').style.display = 'none';
      document.getElementById('navLinks').insertAdjacentHTML('beforeend', `
        <span id="navUserInfo" style="display:flex;gap:10px;align-items:center">
          <span class="nav-user">${user.email.split('@')[0]}</span>
          <button class="nav-logout" onclick="logout()">로그아웃</button>
        </span>
      `);
    }
  }

  async function logout() { await sb.auth.signOut(); location.reload(); }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  async function loadPosts() {
    const { data, error } = await sb.from('todos').select('*').order('created_at', { ascending: false });
    if (error) { console.error(error); return; }
    posts = data || [];
    render();
  }

  async function addPost() {
    const title = document.getElementById('titleInput').value.trim();
    const content = document.getElementById('contentInput').value.trim();
    if (!title) { document.getElementById('titleInput').focus(); return; }

    const row = {
      title, content,
      user_id: currentUser ? currentUser.id : null,
      author_name: currentUser ? currentUser.email.split('@')[0] : '비회원'
    };

    const { error } = await sb.from('todos').insert(row);
    if (error) { alert('등록 실패: ' + error.message); return; }

    document.getElementById('titleInput').value = '';
    document.getElementById('contentInput').value = '';
    await loadPosts();
  }

  async function deletePost(id, userId) {
    if (!canEdit(userId)) { alert('본인 글만 삭제할 수 있습니다.'); return; }
    if (!confirm('정말 삭제할까요?')) return;
    const { error } = await sb.from('todos').delete().eq('id', id);
    if (error) { alert('삭제 실패'); return; }
    await loadPosts();
  }

  function startEdit(id) { editingId = id; render(); const inp = document.getElementById('editTitle_' + id); if (inp) { inp.focus(); inp.select(); } }
  function cancelEdit() { editingId = null; render(); }

  function canEdit(userId) {
    // 1. 진짜 null이거나, 글자 'null'이거나, 아예 값이 없으면 무조건 비회원 글로 판단 -> 통과
    if (!userId || userId === 'null' || userId === 'undefined') return true;
    // 2. 비회원 글이 아닌데(회원이 쓴 글인데) 현재 로그인을 안 했으면 -> 차단
    if (!currentUser) return false;
    // 3. 로그인을 했다면 내 아이디와 글쓴이 아이디가 같은지 비교 -> 같으면 통과
    return currentUser.id === userId;
  }

  async function saveEdit(id, userId) {
    if (!canEdit(userId)) { alert('권한이 없습니다.'); return; }
    const title = document.getElementById('editTitle_' + id).value.trim();
    const content = document.getElementById('editContent_' + id).value.trim();
    if (!title) return;

    const { error } = await sb.from('todos').update({
      title, content, updated_at: new Date().toISOString()
    }).eq('id', id);

    if (error) { alert('수정 실패'); return; }
    editingId = null;
    await loadPosts();
  }

  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function render() {
    const list = document.getElementById('postList');

    if (!posts.length) {
      list.innerHTML = `<div class="empty"><span>📝</span>아직 등록된 글이 없어요.<br>첫 글을 작성해보세요!</div>`;
      return;
    }

    list.innerHTML = posts.map((t, i) => {
      const meta = t.updated_at && t.updated_at !== t.created_at ? `수정됨 · ${formatDate(t.updated_at)}` : formatDate(t.created_at);
      const authorTag = `<div class="todo-author" style="${t.user_id ? '' : 'color:var(--sub)'}">${t.author_name || '비회원'}</div>`;
      const editable = canEdit(t.user_id);

      if (editingId === t.id) {
        return `
          <div class="todo-item" style="animation-delay:${i*0.05}s">
            <div class="edit-form">
              <input id="editTitle_${t.id}" value="${escHtml(t.title)}" maxlength="80"
                onkeydown="if(event.key==='Enter')saveEdit(${t.id},'${t.user_id}');if(event.key==='Escape')cancelEdit()">
              <textarea id="editContent_${t.id}"
                onkeydown="if(event.key==='Escape')cancelEdit()">${escHtml(t.content)}</textarea>
              <div class="edit-actions">
                <button class="btn-cancel" onclick="cancelEdit()">취소</button>
                <button class="btn-save" onclick="saveEdit(${t.id},'${t.user_id}')">저장</button>
              </div>
            </div>
          </div>`;
      }

      return `
        <div class="todo-item" style="animation-delay:${i*0.05}s">
          <div class="todo-body">
            <div class="todo-title">${escHtml(t.title)}</div>
            ${t.content ? `<div class="todo-content">${escHtml(t.content)}</div>` : ''}
            <div class="todo-meta">${meta}</div>
            ${authorTag}
          </div>
          <div class="item-actions">
            ${editable ? `<button class="edit-btn" onclick="startEdit(${t.id})" title="수정">✎</button>` : ''}
            ${editable ? `<button class="del-btn" onclick="deletePost(${t.id},'${t.user_id}')" title="삭제">✕</button>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  document.getElementById('titleInput').addEventListener('keydown', e => { if (e.key === 'Enter') addPost(); });

  (async () => { await initAuth(); await loadPosts(); })();
</script>
</body>
</html>
