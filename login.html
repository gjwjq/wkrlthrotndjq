<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — JayKwon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F7F8FA; --card: #FFFFFF; --text: #111827;
      --sub: #6B7280; --point: #2563EB; --danger: #DC2626;
      --border: #E5E7EB; --radius: 12px; --max-w: 860px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    nav {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(247,248,250,0.88); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border); z-index: 100; height: 56px;
    }
    .nav-inner {
      max-width: var(--max-w); margin: 0 auto; padding: 0 2rem;
      height: 100%; display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; color: var(--point); text-decoration: none; }
    .nav-links { display: flex; gap: 1.75rem; }
    .nav-links a { font-size: 14px; color: var(--sub); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); font-weight: 500; }

    /* 가운데 카드 레이아웃 */
    .auth-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 2rem 4rem;
    }
    .auth-card {
      width: 100%; max-width: 400px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.5rem 2rem;
      animation: fadeUp 0.5s ease both;
    }
    .auth-logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; color: var(--point);
      margin-bottom: 1.75rem; display: block;
    }
    .auth-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .auth-card p { font-size: 14px; color: var(--sub); margin-bottom: 2rem; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .form-group input {
      width: 100%; padding: 11px 14px;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
      color: var(--text); background: var(--bg);
      outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--point); background: #fff; }

    .btn-full {
      width: 100%; padding: 12px;
      background: var(--point); color: #fff;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 500;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; transition: background 0.2s;
      margin-top: 6px;
    }
    .btn-full:hover { background: #1d4ed8; }

    .auth-footer {
      text-align: center; margin-top: 1.5rem;
      font-size: 13px; color: var(--sub);
    }
    .auth-footer a { color: var(--point); text-decoration: none; font-weight: 500; }
    .auth-footer a:hover { text-decoration: underline; }

    .divider-text {
      display: flex; align-items: center; gap: 12px;
      margin: 1.25rem 0; font-size: 12px; color: var(--sub);
    }
    .divider-text::before, .divider-text::after {
      content: ''; flex: 1; border-top: 1px solid var(--border);
    }

    /* 미구현 안내 배너 */
    .notice {
      background: #EFF6FF; border: 1px solid #BFDBFE;
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; color: #1E40AF;
      margin-bottom: 1.5rem;
      font-family: 'JetBrains Mono', monospace;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="index.html">JayKwon.dev</a>
    <div class="nav-links">
      <a href="index.html">홈</a>
      <a href="todos.html">게시판</a>
      <a href="study.html">공부기록</a>
      <a href="login.html" class="active">로그인</a>
    </div>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <span class="auth-logo">// login</span>
    <h1>로그인</h1>
    <p>계정이 없으신가요? <a href="register.html">회원가입</a></p>

    <div class="notice">⚠ 백엔드 구현 예정 — 현재 레이아웃만 완성된 상태입니다.</div>

    <div class="form-group">
      <label>이메일</label>
      <input type="email" placeholder="example@email.com">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" placeholder="비밀번호를 입력하세요">
    </div>
    <button class="btn-full" onclick="alert('백엔드 구현 후 사용 가능합니다.')">로그인</button>

    <div class="auth-footer">
      <a href="#">비밀번호를 잊으셨나요?</a>
    </div>
  </div>
</div>

</body>
</html>
